<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Web Advanced: Rick & Morty</title>
  <link rel="stylesheet" href="style.css">
  <script src="dom.js" defer></script>
</head>
<body>

  <header>
    <h1>Rick & Morty personages</h1>

    <!-- Zoek -->
    <input type="text" placeholder="Zoek..." id="zoekbalk">

    <!-- Filter -->
    <select id="status">
      <option>All status</option>
      <option>Alive</option>
      <option>Dead</option>
      <option>Unknown</option>
    </select>

    <!-- Sort -->
    <select id="sortAZ">
      <option>No Filter</option>
      <option>Name A-Z</option>
      <option>Name Z-A</option>
    </select>
    <select id="afkomst">
        <option>All</option>
        <option>Earth</option>
        <option>Citadel of Ricks</option>
        <option>Abadango</option>
        <option>Testicle Monster Dimension</option>
        <option>Anatomy Park</option>
        <option>Interdimensional Cable</option>
        <option>Unknown</option>
        <option>Worldender's lair</option>
    </select>
    <input type="checkbox" id="showfavorite">
    <label for="showfavorite">Show only favorite</label>

    <!-- <button type="button" data-theme-toggle aria-label="Change to light theme">Change to light theme (or icon here)</button> -->
     <button type="button" id="switch" data-theme-toggle>Change to light theme</button>
  </header>

  <main>

    <!-- Data weergave (voorbeeld statisch) -->
    <section id="my-section">
    </section>

  </main>

  <footer>
    <p>Web Project of Adam Otman - 2026</p>
  </footer>

</body>
</html>
